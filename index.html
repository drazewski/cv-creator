<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ── Primary meta ─────────────────────────────────────── -->
    <title>CV Creator — Build a Professional CV Online for Free</title>
    <meta name="description" content="Create a professional CV or resume in minutes. Choose from multiple layouts, customise colours and fonts, and export to PDF — free, no sign-up required." />
    <meta name="keywords" content="CV creator, resume builder, CV maker, free CV builder, resume online, PDF CV, CV template" />
    <meta name="author" content="CV Creator" />
    <meta name="robots" content="index, follow" />

    <!-- ── Canonical (update when domain is live) ────────────── -->
    <link rel="canonical" href="https://myceevee.com/" />

    <!-- ── Favicon ───────────────────────────────────────────── -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- ── Open Graph (Facebook, LinkedIn, WhatsApp) ─────────── -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://myceevee.com/" />
    <meta property="og:title" content="CV Creator — Build a Professional CV Online for Free" />
    <meta property="og:description" content="Create a professional CV or resume in minutes. Customise layout, colours and fonts, then export to PDF — free, no sign-up required." />
    <meta property="og:image" content="https://myceevee.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="CV Creator" />
    <meta property="og:locale" content="en_US" />

    <!-- ── Twitter / X card ──────────────────────────────────── -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="CV Creator — Build a Professional CV Online for Free" />
    <meta name="twitter:description" content="Create a professional CV or resume in minutes. Customise layout, colours and fonts, then export to PDF — free, no sign-up required." />
    <meta name="twitter:image" content="https://myceevee.com/og-image.png" />

    <!-- ── Structured data (JSON-LD) ─────────────────────────── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "CV Creator",
      "url": "https://myceevee.com/",
      "description": "Create a professional CV or resume in minutes. Customise layout, colours and fonts, then export to PDF — free, no sign-up required.",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "All",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "featureList": [
        "Multiple CV layouts",
        "Custom colours and fonts",
        "PDF export",
        "No sign-up required",
        "Mobile friendly"
      ]
    }
    </script>

    <!-- ── Google Fonts ───────────────────────────────────────── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lato:wght@400;700&family=Merriweather:wght@400;700&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
