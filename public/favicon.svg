  <rect x="28" y="21" width="10" height="1.5" rx="1" fill="#1e2a3a" opacity="0.4"/>
  <!-- Body lines -->
  <rect x="28" y="28" width="14" height="1.5" rx="1" fill="#1e2a3a" opacity="0.35"/>
  <rect x="28" y="31.5" width="12" height="1.5" rx="1" fill="#1e2a3a" opacity="0.25"/>
  <rect x="28" y="35" width="14" height="1.5" rx="1" fill="#1e2a3a" opacity="0.35"/>
  <rect x="28" y="38.5" width="10" height="1.5" rx="1" fill="#1e2a3a" opacity="0.25"/>
  <!-- Sidebar dots (contact icons) -->
  <circle cx="19" cy="28" r="1.5" fill="#fff" opacity="0.7"/>
  <circle cx="19" cy="33" r="1.5" fill="#fff" opacity="0.7"/>
  <circle cx="19" cy="38" r="1.5" fill="#fff" opacity="0.7"/>
